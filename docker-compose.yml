version: "3.8"

services:
  app:
    build: .
    container_name: url-shortener-app
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306
      MYSQL_DB: url_shortener
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      CACHE_ENABLED: true